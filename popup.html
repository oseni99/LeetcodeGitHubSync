<!DOCTYPE html>
<html>
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fab fa-github"></i>
          LeetCode Sync
        </div>
      </div>
      <div class="card-content">
        <div class="status-card">
          <div class="status-row">
            <span class="status-label">Sync status</span>
            <span class="status-value status-ready" id="sync-status">
              <i class="fas fa-check-circle" id="sync-status-icon"></i>
              <span id="sync-status-text">Ready</span>
            </span>
          </div>
          <p class="status-detail" id="sync-status-detail">
            Ready to sync submissions.
          </p>
          <div class="status-meta">
            <span class="meta-label">Last sync</span>
            <span class="last-sync" id="last-sync">Never synced</span>
          </div>
        </div>

        <button class="btn btn-primary" id="sync-now">
          <i class="fas fa-sync-alt"></i>
          Sync Now
        </button>

        <button class="btn btn-secondary btn-quiet" id="open-settings" type="button">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </button>

        <div class="repo-info">
          <p class="repo-label">Repository</p>
          <p class="repo-value" id="repo-display">Not configured</p>
          <p class="repo-meta">
            <span class="repo-host">github.com</span>
            <span class="repo-branch">Branch: <span>main</span></span>
          </p>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leetcode GitHub Sync - Options</title>
    <link rel="stylesheet" href="styles/options.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="page-shell">
      <section class="settings-card">
        <p class="eyebrow">Configuration</p>
        <h1>GitHub Settings</h1>
        <p class="intro">
          Save the repository and token used for syncing submissions.
        </p>

        <form id="config-form">
          <div class="field-group">
            <label for="repo-url">GitHub Repository URL</label>
            <input
              type="text"
              id="repo-url"
              name="repo-url"
              required
              autocomplete="url"
              placeholder="https://github.com/username/repository"
            />
          </div>

          <div class="field-group">
            <label for="github-token">GitHub Personal Access Token</label>
            <input
              type="password"
              id="github-token"
              name="github-token"
              required
              autocomplete="current-password"
              placeholder="ghp_YourPersonalAccessToken"
            />
          </div>

          <button type="submit">Save</button>
        </form>

        <div id="status" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
